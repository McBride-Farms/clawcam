<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c23152"/>
    </linearGradient>
    <linearGradient id="claw" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Camera body -->
  <rect x="30" y="45" width="90" height="70" rx="10" fill="url(#bg)" stroke="#0f3460" stroke-width="2"/>

  <!-- Camera top detail / flash -->
  <rect x="45" y="38" width="22" height="12" rx="3" fill="#0f3460"/>

  <!-- Lens outer ring -->
  <circle cx="75" cy="80" r="26" fill="none" stroke="url(#lens)" stroke-width="3" filter="url(#glow)"/>

  <!-- Lens middle -->
  <circle cx="75" cy="80" r="18" fill="#0d1117" stroke="#533483" stroke-width="1.5"/>

  <!-- Lens inner / aperture -->
  <circle cx="75" cy="80" r="9" fill="url(#lens)" opacity="0.9"/>

  <!-- Lens glint -->
  <circle cx="70" cy="75" r="3" fill="#fff" opacity="0.5"/>

  <!-- AI scan lines radiating from lens -->
  <g stroke="#e94560" stroke-width="1" opacity="0.4">
    <line x1="101" y1="65" x2="118" y2="55"/>
    <line x1="101" y1="80" x2="120" y2="80"/>
    <line x1="101" y1="95" x2="118" y2="105"/>
  </g>

  <!-- Detection bracket top-right -->
  <g stroke="#e94560" stroke-width="2" fill="none" opacity="0.6" filter="url(#glow)">
    <polyline points="108,52 118,52 118,62"/>
    <polyline points="108,108 118,108 118,98"/>
  </g>

  <!-- Claw marks (three diagonal slashes) -->
  <g stroke="url(#claw)" stroke-width="3" stroke-linecap="round" opacity="0.85" filter="url(#glow)">
    <line x1="130" y1="50" x2="142" y2="110"/>
    <line x1="140" y1="48" x2="152" y2="108"/>
    <line x1="150" y1="50" x2="162" y2="110"/>
  </g>

  <!-- Text: clawcam -->
  <text x="175" y="92" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace" font-size="42" font-weight="700" fill="#eee" letter-spacing="-1">
    <tspan fill="#e94560">claw</tspan><tspan fill="#c9d1d9">cam</tspan>
  </text>

  <!-- Tagline -->
  <text x="177" y="115" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="12" fill="#8b949e" letter-spacing="2">
    AI CAMERA MONITOR
  </text>

  <!-- Small Pi icon / chip -->
  <rect x="390" y="72" width="16" height="16" rx="2" fill="none" stroke="#533483" stroke-width="1.5"/>
  <g stroke="#533483" stroke-width="1">
    <line x1="394" y1="69" x2="394" y2="72"/>
    <line x1="398" y1="69" x2="398" y2="72"/>
    <line x1="402" y1="69" x2="402" y2="72"/>
    <line x1="394" y1="88" x2="394" y2="91"/>
    <line x1="398" y1="88" x2="398" y2="91"/>
    <line x1="402" y1="88" x2="402" y2="91"/>
    <line x1="387" y1="76" x2="390" y2="76"/>
    <line x1="387" y1="80" x2="390" y2="80"/>
    <line x1="387" y1="84" x2="390" y2="84"/>
    <line x1="406" y1="76" x2="409" y2="76"/>
    <line x1="406" y1="80" x2="409" y2="80"/>
    <line x1="406" y1="84" x2="409" y2="84"/>
  </g>
</svg>
