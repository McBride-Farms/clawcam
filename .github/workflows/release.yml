name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-native:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: clawcam-linux-amd64

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libglib2.0-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/clawcam ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256 2>/dev/null || \
            shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  # Native arm64 build on the McBride-Farms self-hosted Pi runner. This
  # avoids the cross-compile glibc/libstdc++ mismatch with the pyke/ort
  # prebuilt aarch64 binary by compiling on the same toolchain that runs
  # in production. Tag-push triggered only, so untrusted code can't run.
  build-pi-arm64:
    name: Build clawcam-pi-arm64
    runs-on: [self-hosted, ARM64]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libglib2.0-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            pkg-config

      - name: Build
        # rustup-managed toolchain (installed on the runner during setup)
        # rather than the dtolnay action — avoids re-downloading per run.
        run: |
          . "$HOME/.cargo/env"
          cargo build --release --target aarch64-unknown-linux-gnu

      - name: Package binary
        run: |
          cp target/aarch64-unknown-linux-gnu/release/clawcam clawcam-pi-arm64
          chmod +x clawcam-pi-arm64
          tar czf clawcam-pi-arm64.tar.gz clawcam-pi-arm64
          sha256sum clawcam-pi-arm64.tar.gz > clawcam-pi-arm64.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: clawcam-pi-arm64
          path: |
            clawcam-pi-arm64.tar.gz
            clawcam-pi-arm64.tar.gz.sha256

  model:
    name: Package YOLO model
    runs-on: ubuntu-latest
    steps:
      - name: Export YOLOv8n to ONNX
        run: |
          pip install ultralytics onnx --quiet
          python3 -c "
          from ultralytics import YOLO
          model = YOLO('yolov8n.pt')
          model.export(format='onnx', imgsz=640, opset=17, simplify=True)
          "
          test -f yolov8n.onnx || exit 1
          sha256sum yolov8n.onnx > yolov8n.onnx.sha256

      - name: Upload model artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: yolov8n-model
          path: |
            yolov8n.onnx
            yolov8n.onnx.sha256

  release:
    name: Create release
    needs: [build-native, build-pi-arm64, model]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" -o -name "*.onnx" \) \
            -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          generate_release_notes: true
          files: release/*
          body: |
            ## Install

            **🤖 Send to your AI agent:**
            > Read https://raw.githubusercontent.com/McBride-Farms/clawcam/master/SKILL.md and install the clawcam skill. Run: `curl -fsSL https://raw.githubusercontent.com/McBride-Farms/clawcam/master/skill-install.sh | bash`

            **👤 Manual install:**
            ```sh
            curl -fsSL https://raw.githubusercontent.com/McBride-Farms/clawcam/master/install.sh | bash
            ```

            Or download the binary for your platform from the assets below.

            ## Assets

            | File | Description |
            |------|-------------|
            | `clawcam-linux-amd64` | Host CLI — Linux x86_64 |
            | `clawcam-pi-arm64` | Device binary — Raspberry Pi 4/5 (64-bit) |
            | `yolov8n.onnx` | YOLOv8n detection model (COCO 80-class) |
