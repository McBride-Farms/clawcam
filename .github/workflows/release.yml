name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-native:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: clawcam-linux-amd64
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: clawcam-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: clawcam-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libglib2.0-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            pkg-config

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gstreamer pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/clawcam ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256 2>/dev/null || \
            shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  build-cross:
    name: Build ${{ matrix.artifact }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            artifact: clawcam-pi-arm64
          - target: armv7-unknown-linux-gnueabihf
            artifact: clawcam-pi-armv7

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build with cross
        env:
          CROSS_CONTAINER_OPTS: "-e ORT_CACHE_DIR=/tmp/ort-cache"
        run: cross build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/clawcam ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  model:
    name: Package YOLO model
    runs-on: ubuntu-latest
    steps:
      - name: Export YOLOv8n to ONNX
        run: |
          pip install ultralytics onnx --quiet
          python3 -c "
          from ultralytics import YOLO
          model = YOLO('yolov8n.pt')
          model.export(format='onnx', imgsz=640, opset=17, simplify=True)
          "
          test -f yolov8n.onnx || exit 1
          sha256sum yolov8n.onnx > yolov8n.onnx.sha256

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: yolov8n-model
          path: |
            yolov8n.onnx
            yolov8n.onnx.sha256

  release:
    name: Create release
    needs: [build-native, build-cross, model]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" -o -name "*.onnx" \) \
            -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
          body: |
            ## Install

            **🤖 Send to your AI agent:**
            > Read https://raw.githubusercontent.com/McBride-Farms/clawcam/master/SKILL.md and install the clawcam skill. Run: `curl -fsSL https://raw.githubusercontent.com/McBride-Farms/clawcam/master/skill-install.sh | bash`

            **👤 Manual install:**
            ```sh
            curl -fsSL https://raw.githubusercontent.com/McBride-Farms/clawcam/master/install.sh | bash
            ```

            Or download the binary for your platform from the assets below.

            ## Assets

            | File | Description |
            |------|-------------|
            | `clawcam-linux-amd64` | Host CLI — Linux x86_64 |
            | `clawcam-darwin-amd64` | Host CLI — macOS Intel |
            | `clawcam-darwin-arm64` | Host CLI — macOS Apple Silicon |
            | `clawcam-pi-arm64` | Device binary — Raspberry Pi 4/5 (64-bit) |
            | `clawcam-pi-armv7` | Device binary — Raspberry Pi 3/Zero 2 (32-bit) |
            | `yolov8n.onnx` | YOLOv8n detection model (COCO 80-class) |
